version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive
    - misspell
    - nolintlint
    - prealloc
    - unconvert
    - unparam
    - errorlint
    - bodyclose

formatters:
  enable:
    - gofmt
    - goimports

output:
  formats:
    text:
      path: stdout
